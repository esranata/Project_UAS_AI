<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk – GlowGuide</title>
  <meta name="description" content="Masuk ke akun GlowGuide Anda untuk mengakses konsultasi skincare dan rekomendasi produk personal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <a href="../index.html" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">GlowGuide</span>
      </a>
      <p>Selamat datang kembali! ✨</p>
    </div>

    <div id="loginAlert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="email@contoh.com" required autocomplete="email" />
        <div class="form-error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="password-input-wrap">
          <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" required autocomplete="current-password" />
          <span class="password-toggle" id="togglePassword" role="button" aria-label="Tampilkan password">👁️</span>
        </div>
        <div class="form-error" id="passwordError"></div>
      </div>
      <button type="submit" class="btn btn-pink full-width mb-16" id="loginBtn">Masuk</button>
    </form>

    <div class="auth-divider"><span>atau masuk sebagai</span></div>
    <button class="btn btn-ghost full-width mb-16" id="btnDemoAdmin">👑 Demo Admin</button>
    <button class="btn btn-ghost full-width" id="btnDemoUser">💕 Demo Customer</button>

    <div class="auth-footer">
      Belum punya akun? <a href="register.html">Daftar sekarang</a>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (Auth.isLoggedIn()) {
        window.location.href = Auth.isAdmin() ? 'admin.html' : '../index.html';
        return;
      }

      const loginForm = document.getElementById('loginForm');
      const togglePassword = document.getElementById('togglePassword');
      const loginPassword = document.getElementById('loginPassword');
      const loginAlert = document.getElementById('loginAlert');

      // Toggle password visibility
      togglePassword.addEventListener('click', () => {
        const isHidden = loginPassword.type === 'password';
        loginPassword.type = isHidden ? 'text' : 'password';
        togglePassword.textContent = isHidden ? '🙈' : '👁️';
      });

      // Login form submit
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        let valid = true;

        document.getElementById('emailError').textContent = '';
        document.getElementById('passwordError').textContent = '';

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('emailError').textContent = 'Masukkan email yang valid';
          valid = false;
        }
        if (!password || password.length < 6) {
          document.getElementById('passwordError').textContent = 'Password minimal 6 karakter';
          valid = false;
        }
        if (!valid) return;

        // Check from stored users
        const users = JSON.parse(localStorage.getItem('gg_users') || '[]');
        const user = users.find(u => u.email === email && u.password === password);
        if (user) {
          Auth.setUser(user);
          Toast.success('Selamat datang, ' + user.name + '! 💕');
          setTimeout(() => {
            window.location.href = user.role === 'admin' ? 'admin.html' : '../index.html';
          }, 800);
        } else {
          loginAlert.innerHTML = `<div class="alert alert-error">❌ Email atau password salah. Silakan coba lagi.</div>`;
        }
      });

      // Demo logins
      document.getElementById('btnDemoAdmin').addEventListener('click', () => {
        const admin = { id: 'admin-001', name: 'Beauty Admin', email: 'admin@glowguide.com', role: 'admin', avatar: '👑' };
        Auth.setUser(admin);
        Toast.success('Masuk sebagai Admin! 👑');
        setTimeout(() => window.location.href = 'admin.html', 800);
      });

      document.getElementById('btnDemoUser').addEventListener('click', () => {
        const demoUser = { id: 'demo-001', name: 'Putri Cantik', email: 'putri@demo.com', role: 'customer', avatar: '💕', skinType: 'kombinasi' };
        Auth.setUser(demoUser);
        Toast.success('Selamat datang, Putri! 💕');
        setTimeout(() => window.location.href = '../index.html', 800);
      });
    });
  </script>
</body>
</html>
